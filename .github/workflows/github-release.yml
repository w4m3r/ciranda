name: GitHub Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  github-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is reachable from main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches crate version
        run: |
          version="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "ciranda") | .version')"

          if [ "$GITHUB_REF_NAME" != "v$version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $version"
            exit 1
          fi

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package release asset
        run: |
          target="$(rustc -vV | sed -n 's/^host: //p')"
          asset="ciranda-$GITHUB_REF_NAME-$target.tar.gz"

          mkdir -p dist/package
          cp target/release/ciranda dist/package/ciranda
          cp README.md LICENSE-APACHE LICENSE-MIT dist/package/
          tar -czf "dist/$asset" -C dist/package .

          cd dist
          sha256sum "$asset" > "$asset.sha256"

      - name: Create GitHub Release
        run: |
          asset="$(find dist -maxdepth 1 -name 'ciranda-*.tar.gz' -print)"

          gh release create "$GITHUB_REF_NAME" \
            "$asset" \
            "$asset.sha256" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
